spring.config.import=application-secrets.properties

spring.application.name=tildau
logging.level.org.springframework.security=DEBUG

server.port=8080

##############################
#   Datasource  #
##############################

spring.datasource.url=jdbc:postgresql://postgres:5432/tildau
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000

##############################
#   JPA & Hibernate          #
##############################

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=uuid
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

##############################
#   JWT                      #
##############################

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

##############################
#   Localization             #
##############################

spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

##############################
#   MVC                      #
##############################
#
#spring.mvc.pathmatch.matching-strategy=ant_path_matcher
#
###############################
##   Flyway                   #
###############################

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

###############################
##   MinIO                   #
###############################

minio.url=http://minio:9000
minio.access-key=${MinIO_ACCESS_KEY}
minio.secret-key=${MinIO_SECRET_KEY}
minio.bucket.tildau=tildau
minio.url-expiration-minutes=20

###############################
##   AI Service               #
###############################

ai.module.url=http://ai:8000/ai/analyze
ai.module.timeout=60

###############################
##   Docker                   #
###############################

spring.docker.compose.enabled=false