services:
  postgres:
    image: postgres:15
    container_name: tildau-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: tildau-minio
    environment:
      MINIO_ROOT_USER: ${MinIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MinIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: tildau-ai
    # deploy:
    #   resources:
    #     limits:
    #       memory: 2G
    ports:
      - "8000:8000"
    volumes:
      - ./ai:/app
    restart: always
    depends_on:
      - postgres
      - minio

  backend:
    build:
      context: ./backend/tildau
      dockerfile: Dockerfile
    container_name: tildau-backend
    ports:
      - "8080:8080"
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      MinIO_ACCESS_KEY: ${MinIO_ACCESS_KEY}
      MinIO_SECRET_KEY: ${MinIO_SECRET_KEY}
    depends_on:
      - postgres
      - minio
      - ai

volumes:
  pgdata:
  minio-data: