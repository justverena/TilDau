services:
  postgres:
    image: postgres:15
    container_name: tildau-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: tildau-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: tildau-ai
    # deploy:
    #   resources:
    #     limits:
    #       memory: 2G
    ports:
      - "8000:8000"
    volumes:
      - ./ai:/app
    restart: always
    depends_on:
      - postgres
      - minio

volumes:
  pgdata:
  minio-data: