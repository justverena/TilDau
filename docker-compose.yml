services:
  postgres:
    image: postgres:15
    container_name: tildau-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    image: minio/minio:latest
    container_name: tildau-minio
    environment:
      MINIO_ROOT_USER: ${MinIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MinIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: tildau-ai
    ports:
      - "8000:8000"
    volumes:
      - whisper-cache:/root/.cache/whisper
    restart: unless-stopped
    depends_on:
      - postgres
      - minio
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend/tildau
      dockerfile: Dockerfile
    container_name: tildau-backend
    ports:
      - "8080:8080"
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      MinIO_ACCESS_KEY: ${MinIO_ACCESS_KEY}
      MinIO_SECRET_KEY: ${MinIO_SECRET_KEY}
    restart: unless-stopped
    depends_on:
      - postgres
      - minio
      - ai
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:latest
    container_name: tildau-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    depends_on:
      - backend
      - ai
      - minio
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    
volumes:
  pgdata:
  minio-data:
  whisper-cache: